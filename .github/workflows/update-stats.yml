name: Update stats cards

on:
  schedule:
    - cron: "0 18 * * *" # 03:00 JST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVG cards
        run: python3 scripts/generate_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # optional user PAT: when set, language stats include private repos
          PROFILE_TOKEN: ${{ secrets.PROFILE_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          git diff --cached --quiet || (git commit -m "chore: update stats cards" && git push)
